services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loansight-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/loansight.db
    ports:
      - "3001:8000"
    volumes:
      - backend_data:/app/data
    networks:
      - loansight_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  backend_data:

networks:
  loansight_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24
