services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loansight-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/loansight.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  backend_data:
